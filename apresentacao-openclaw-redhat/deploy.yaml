apiVersion: apps/v1
kind: Deployment
metadata:
  name: navi-apresentacao-openclaw
  labels:
    app: navi-apresentacao
    app.kubernetes.io/part-of: navi-claw-apresentacoes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: navi-apresentacao
  template:
    metadata:
      labels:
        app: navi-apresentacao
    spec:
      containers:
      - name: nginx
        image: image-registry.openshift-image-registry.svc:5000/SEU_NAMESPACE/navi-apresentacao-openclaw:latest
        ports:
        - containerPort: 8080
          protocol: TCP
        resources:
          limits:
            memory: "128Mi"
            cpu: "200m"
          requests:
            memory: "64Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: navi-apresentacao-openclaw
  labels:
    app: navi-apresentacao
spec:
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: navi-apresentacao
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: navi-apresentacao-openclaw
  labels:
    app: navi-apresentacao
spec:
  to:
    kind: Service
    name: navi-apresentacao-openclaw
  port:
    targetPort: http
  tls:
    termination: edge
